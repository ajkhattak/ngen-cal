# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Init Config

on:
  push:
    branches: master
  pull_request:

jobs:
  build:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v2

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: false

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install --default

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        uvx flake8 ./python/ngen_cal --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        uvx flake8 ./python/ngen_cal --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Installing ngen_init_config in python virtual environment
      run: |
        uv venv
        uv pip install "python/ngen_init_config[develop]"

    - name: List dependency versions
      run: |
        uv pip freeze

    - name: Testing ngen.init_config with pytest
      run: |
        source .venv/bin/activate
        pytest python/ngen_init_config
